<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F1F6F6" />
    <title>Sanduq — Save together, decide together</title>
    <style>
      /* Prevent iOS Safari from auto-zooming when focusing inputs:
         iOS zooms in on any input with font-size < 16px. */
      input, textarea, select { font-size: 16px; }
      /* Lock the page: no horizontal scroll/drag, no pinch zoom. The app is a
         fixed-width mobile shell, so side-to-side dragging is never wanted. */
      html, body {
        max-width: 100%;
        overflow-x: hidden;
        touch-action: pan-y;          /* allow vertical scroll only */
        overscroll-behavior-x: none;  /* no horizontal rubber-banding */
        -webkit-text-size-adjust: 100%;
      }
      #root { max-width: 100%; overflow-x: hidden; }
    </style>
  </head>
  <body style="margin:0;background:#F1F6F6">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
